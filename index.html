<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoceanAPI SMS Sender</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 480px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: 600;
        }
        input[type="text"], input[type="password"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }
        textarea {
            resize: vertical;
            height: 100px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #0056b3; }

        .alert {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 13px;
            word-break: break-all;
            display: none;
        }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error   { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info    { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }

        /* ---- Settings Panel ---- */
        .settings-toggle {
            text-align: center;
            margin-bottom: 20px;
        }
        .settings-toggle a {
            font-size: 13px;
            color: #007bff;
            cursor: pointer;
            text-decoration: none;
        }
        .settings-toggle a:hover { text-decoration: underline; }

        .settings-panel {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 18px;
            margin-bottom: 20px;
            display: none;
        }
        .settings-panel h4 {
            margin: 0 0 12px 0;
            color: #444;
            font-size: 15px;
        }
        .token-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .token-row input {
            flex: 1;
        }
        .btn-small {
            padding: 10px 14px;
            font-size: 13px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            white-space: nowrap;
            width: auto;
        }
        .btn-save  { background-color: #28a745; color: white; }
        .btn-save:hover  { background-color: #1e7e34; }
        .btn-show  { background-color: #6c757d; color: white; }
        .btn-show:hover  { background-color: #545b62; }

        .token-status {
            font-size: 12px;
            margin-top: 8px;
            color: #555;
        }
        .token-status span {
            font-weight: bold;
            color: #007bff;
            word-break: break-all;
        }

        hr { border: none; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>📱 MoceanAPI SMS Sender</h2>

    <!-- Settings Toggle Link -->
    <div class="settings-toggle">
        <a onclick="toggleSettings()">⚙️ API Settings</a>
    </div>

    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel">
        <h4>🔑 API Token Update Karein</h4>
        <div class="token-row">
            <input type="password" id="tokenInput" placeholder="Naya API Token yahan paste karein...">
            <button class="btn-small btn-show" onclick="toggleTokenVisibility()">👁️</button>
            <button class="btn-small btn-save" onclick="saveToken()">Save</button>
        </div>
        <div class="token-status" id="tokenStatus">
            Current Token: <span id="currentTokenDisplay">Loading...</span>
        </div>
    </div>

    <div id="statusBox" class="alert"></div>

    <form id="smsForm">
        <div class="form-group">
            <label for="to">Mobile Number (With Country Code):</label>
            <input type="text" id="to" placeholder="Example: 263789789097" required>
        </div>
        <div class="form-group">
            <label for="text">Message:</label>
            <textarea id="text" placeholder="Type your message here..." required></textarea>
        </div>
        <button type="submit" id="submitBtn">Send SMS</button>
    </form>
</div>

<script>
    // ===== DEFAULT TOKEN (Sirf pehli baar use hoga) =====
    const DEFAULT_TOKEN = "apit-K8VF1J8FDU60hykWbWB8k1Y8ZSkBKhFj-fqO4Z";
    const TOKEN_KEY = "mocean_api_token";

    // ===== Token Load karna =====
    function getToken() {
        return localStorage.getItem(TOKEN_KEY) || DEFAULT_TOKEN;
    }

    function saveToken() {
        const newToken = document.getElementById('tokenInput').value.trim();
        if (!newToken) {
            alert("Token khali nahi ho sakta!");
            return;
        }
        localStorage.setItem(TOKEN_KEY, newToken);
        document.getElementById('tokenInput').value = '';
        updateTokenDisplay();

        const statusBox = document.getElementById('statusBox');
        statusBox.style.display = "block";
        statusBox.className = "alert info";
        statusBox.innerText = "✅ API Token successfully save ho gaya!";
        setTimeout(() => { statusBox.style.display = "none"; }, 3000);
    }

    function updateTokenDisplay() {
        const token = getToken();
        const masked = token.substring(0, 8) + "••••••••" + token.substring(token.length - 4);
        document.getElementById('currentTokenDisplay').innerText = masked;
    }

    function toggleSettings() {
        const panel = document.getElementById('settingsPanel');
        panel.style.display = (panel.style.display === 'none' || panel.style.display === '') ? 'block' : 'none';
        updateTokenDisplay();
    }

    function toggleTokenVisibility() {
        const input = document.getElementById('tokenInput');
        const btn = document.querySelector('.btn-show');
        if (input.type === 'password') {
            input.type = 'text';
            btn.innerText = '🙈';
        } else {
            input.type = 'password';
            btn.innerText = '👁️';
        }
    }

    // Page load par token display update karo
    window.onload = function() {
        updateTokenDisplay();
    };

    // ===== SMS Send karna =====
    document.getElementById('smsForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const to = document.getElementById('to').value;
        const text = document.getElementById('text').value;
        const statusBox = document.getElementById('statusBox');
        const submitBtn = document.getElementById('submitBtn');

        statusBox.style.display = "none";
        submitBtn.innerText = "Sending...";
        submitBtn.disabled = true;

        const token = getToken();
        const url = "https://corsproxy.io/?https://rest.moceanapi.com/rest/2/sms";

        const details = new URLSearchParams();
        details.append('mocean-from', 'MOCEAN');
        details.append('mocean-to', to);
        details.append('mocean-text', text);
        details.append('mocean-resp-format', 'json');

        fetch(url, {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: details
        })
        .then(response => response.text())
        .then(textData => {
            statusBox.style.display = "block";
            try {
                const data = JSON.parse(textData);
                if (data.messages && data.messages[0] && data.messages[0].status == 0) {
                    statusBox.className = "alert success";
                    statusBox.innerText = "✅ SMS Successfully Send Ho Gaya!";
                } else {
                    statusBox.className = "alert error";
                    statusBox.innerText = "❌ API Error: " + JSON.stringify(data);
                }
            } catch(jsonError) {
                if (textData.includes('status="0"') || textData.includes('<status>0</status>')) {
                    statusBox.className = "alert success";
                    statusBox.innerText = "✅ SMS Successfully Send Ho Gaya! (XML Status 0)";
                } else {
                    statusBox.className = "alert error";
                    statusBox.innerText = "Raw Response: " + textData;
                }
            }
            submitBtn.innerText = "Send SMS";
            submitBtn.disabled = false;
        })
        .catch(error => {
            statusBox.style.display = "block";
            statusBox.className = "alert error";
            statusBox.innerText = "❌ Failed to Send: " + error.message;
            submitBtn.innerText = "Send SMS";
            submitBtn.disabled = false;
        });
    });
</script>

</body>
</html>
