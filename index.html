<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoceanAPI SMS Sender</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: 600;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }
        textarea {
            resize: vertical;
            height: 100px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        .alert {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 13px;
            word-break: break-all;
            display: none;
        }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h2>MoceanAPI SMS Sender</h2>
    
    <div id="statusBox" class="alert"></div>

    <form id="smsForm">
        <div class="form-group">
            <label for="to">Mobile Number (With Country Code):</label>
            <input type="text" id="to" placeholder="Example: 263789789097" required>
        </div>
        
        <div class="form-group">
            <label for="text">Message:</label>
            <textarea id="text" placeholder="Type your message here..." required></textarea>
        </div>
        
        <button type="submit" id="submitBtn">Send SMS</button>
    </form>
</div>

<script>
document.getElementById('smsForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const to = document.getElementById('to').value;
    const text = document.getElementById('text').value;
    const statusBox = document.getElementById('statusBox');
    const submitBtn = document.getElementById('submitBtn');
    
    // UI Reset
    statusBox.style.display = "none";
    submitBtn.innerText = "Sending...";
    submitBtn.disabled = true;

    // Aapka bilkul naya token yahan add ho chuka hai
    const token = "apit-qjSf3GGDgVKihKumJBdaDDT67uj9tiYH-rEMi8";
    const url = "https://corsproxy.io/?https://rest.moceanapi.com/rest/2/sms";

    // Parameters build karna
    const details = new URLSearchParams();
    details.append('mocean-from', 'MOCEAN');
    details.append('mocean-to', to);
    details.append('mocean-text', text);
    details.append('mocean-resp-format', 'json');

    fetch(url, {
        method: 'POST',
        headers: {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: details
    })
    .then(response => {
        return response.text();
    })
    .then(textData => {
        statusBox.style.display = "block";
        
        try {
            const data = JSON.parse(textData);
            
            if(data.messages && data.messages[0] && data.messages[0].status == 0) {
                statusBox.className = "alert success";
                statusBox.innerText = "SMS Sent Successfully!";
            } else {
                statusBox.className = "alert error";
                statusBox.innerText = "API Error: " + JSON.stringify(data);
            }
        } catch(jsonError) {
            // XML fallback handle
            if (textData.includes('status="0"') || textData.includes('<status>0</status>')) {
                statusBox.className = "alert success";
                statusBox.innerText = "SMS Sent Successfully! (XML Format Status 0)";
            } else {
                statusBox.className = "alert error";
                statusBox.innerText = "Raw Response: " + textData;
            }
        }
        
        submitBtn.innerText = "Send SMS";
        submitBtn.disabled = false;
    })
    .catch(error => {
        statusBox.style.display = "block";
        statusBox.className = "alert error";
        statusBox.innerText = "Failed to Send: " + error.message;
        
        submitBtn.innerText = "Send SMS";
        submitBtn.disabled = false;
    });
});
</script>

</body>
</html>
